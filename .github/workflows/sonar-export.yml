name: Export SonarCloud Issues

on:
  workflow_dispatch:
    inputs:
      sonar_token:
        description: 'SonarCloud token'
        required: true
        type: string

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/affectionate-archimedes-yIHlh

      - name: Fetch all SonarCloud issues
        run: |
          TOKEN="${{ github.event.inputs.sonar_token }}"
          ORG="praxiswrite"
          PROJECT="PraxisWrite_Praxis"
          PAGE=1
          ALL_ISSUES="[]"

          while true; do
            RESPONSE=$(curl -sf -u "${TOKEN}:" \
              "https://sonarcloud.io/api/issues/search?organization=${ORG}&componentKeys=${PROJECT}&resolved=false&ps=500&p=${PAGE}&additionalFields=comments")

            ISSUES=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d['issues']))")
            COUNT=$(echo "$ISSUES" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")

            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            ALL_ISSUES=$(python3 -c "
          import sys, json
          existing = json.loads('''$ALL_ISSUES''')
          new = json.loads(sys.stdin.read())
          existing.extend(new)
          print(json.dumps(existing))
          " <<< "$ISSUES")

            echo "Page $PAGE: fetched $COUNT issues (total so far: $(echo "$ALL_ISSUES" | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))'))"
            PAGE=$((PAGE + 1))
          done

          echo "$ALL_ISSUES" > sonar-issues-raw.json

      - name: Summarise issues
        run: |
          python3 << 'EOF'
          import json

          with open("sonar-issues-raw.json") as f:
              issues = json.load(f)

          by_rule = {}
          by_type = {}
          by_severity = {}

          for issue in issues:
              rule = issue.get("rule", "?")
              t = issue.get("type", "?")
              s = issue.get("severity", "?")
              msg = issue.get("message", "")
              comp = issue.get("component", "").replace("PraxisWrite_Praxis:", "")
              line = issue.get("line", "?")

              by_rule.setdefault(rule, {"count": 0, "type": t, "severity": s, "message": msg, "examples": []})
              by_rule[rule]["count"] += 1
              if len(by_rule[rule]["examples"]) < 5:
                  by_rule[rule]["examples"].append(f"{comp}:{line}")

              by_type[t] = by_type.get(t, 0) + 1
              by_severity[s] = by_severity.get(s, 0) + 1

          summary = {
              "total": len(issues),
              "by_type": by_type,
              "by_severity": by_severity,
              "by_rule": sorted(
                  [{"rule": r, **v} for r, v in by_rule.items()],
                  key=lambda x: -x["count"]
              )
          }

          with open("sonar-issues-summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          print(f"Total issues: {len(issues)}")
          print(f"By type: {by_type}")
          print(f"By severity: {by_severity}")
          print("Top rules:")
          for r in summary["by_rule"][:20]:
              print(f"  {r['rule']} ({r['severity']}/{r['type']}): {r['count']}  — e.g. {r['message'][:60]}")
          EOF

      - name: Commit summary to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sonar-issues-summary.json sonar-issues-raw.json
          git commit -m "chore: export SonarCloud issues for triage"
          git push
