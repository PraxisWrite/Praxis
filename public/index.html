<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>praxis</title>
    <meta
      name="description"
      content="Praxis is a structured writing platform for English teachers — guide students through the writing process and see exactly how they wrote, from first idea to final draft."
    />
    <!-- Warm up the Sentry connections early without blocking render. -->
    <link rel="preconnect" href="https://js-de.sentry-cdn.com" crossorigin />
    <link rel="preconnect" href="https://browser.sentry-cdn.com" crossorigin />
    <!-- The brand glyph is the login LCP and is drawn by JS, so fetch it up front. -->
    <link rel="preload" as="image" href="favicon-256.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />

    <!-- Error monitoring (Sentry). The loader runs first and defines the Sentry
         stub synchronously; sentry-init.js then attaches the feedback widget and
         error handlers via Sentry.onLoad(). Kept non-async: the loader was never
         render-blocking here, so async bought nothing and dropped the widget. -->
    <script
      src="https://js-de.sentry-cdn.com/ce9396547e963ef331dbb030435c4d46.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="sentry-init.js"></script>
  </head>
  <body>
    <main id="app">
      <!-- First-paint skeleton: painted during HTML parse, before the deferred
           app scripts download. JS swaps in real content once the session check
           resolves, so first paint no longer waits on JS + auth. -->
      <div class="boot-skeleton" aria-hidden="true">
        <span class="boot-skeleton-mark">
          <img src="favicon-256.png" alt="" width="64" height="64" />
        </span>
        <span class="boot-skeleton-label">Loading praxis…</span>
      </div>
    </main>
    <script src="core-utils.js" defer></script>
    <script src="auth.js" defer></script>
    <script src="deadline-utils.js" defer></script>
    <script src="storage-utils.js" defer></script>
    <script src="ai-assist-utils.js" defer></script>
    <script src="line-number-utils.js" defer></script>
    <script src="rubric-utils.js" defer></script>
    <script src="review-utils.js" defer></script>
    <script src="paste-evidence-utils.js" defer></script>
    <script src="writing-process/types.js" defer></script>
    <script src="writing-process/events.js" defer></script>
    <script src="writing-process/cohorts.js" defer></script>
    <script src="writing-process/analyze.js" defer></script>
    <script src="writing-process/render.js" defer></script>
    <script src="writing-process/admin.js" defer></script>
    <script src="submission-utils.js" defer></script>
    <script src="admin-utils.js" defer></script>
    <script src="api-service.js" defer></script>
    <script src="accountSecurity.js" defer></script>
    <script src="app-constants.js" defer></script>
    <script src="rubric-render.js" defer></script>
    <script src="writing-behaviour-render.js" defer></script>
    <script src="rich-text-render.js" defer></script>
    <script src="app.js" defer></script>
    <script src="admin-render.js" defer></script>
    <script src="auth-render.js" defer></script>
    <script src="chrome-render.js" defer></script>
    <script src="student-render.js" defer></script>
    <script src="annotation-render.js" defer></script>
    <script src="playback-render.js" defer></script>
    <script src="state-selectors.js" defer></script>
    <script src="teacher-render.js" defer></script>
    <script src="teacher-assist.js" defer></script>
    <script src="teacher-assignment-choice.js" defer></script>
    <script src="teacher-ui-cleanup.js" defer></script>
    <script src="student-chat-outline.js" defer></script>
  </body>
</html>
