name: Apply Sonar server patch

on:
  push:
    branches:
      - sonar-hotspots-fix

permissions:
  contents: write

jobs:
  patch-server:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sonar-hotspots-fix
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch server.js
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('server.js')
          text = path.read_text()

          replacements = [
              ("return String(configuredBase).replace(/\\/+$/, '');", "return stripTrailingSlashes(configuredBase);"),
              ("return originHeader.replace(/\\/+$/, '');", "return stripTrailingSlashes(originHeader);"),
              ("return `${forwardedProto}://${forwardedHost}`.replace(/\\/+$/, '');", "return stripTrailingSlashes(`${forwardedProto}://${forwardedHost}`);"),
              ("return `${req.protocol || 'https'}://${host}`.replace(/\\/+$/, '');", "return stripTrailingSlashes(`${req.protocol || 'https'}://${host}`);"),
              ("return String(configuredBase || '').replace(/\\/+$/, '');", "return stripTrailingSlashes(configuredBase);"),
              ("function isLocalhostUrl(value) {\n  return /(^https?:\\/\\/)?(localhost|127\\.0\\.0\\.1|\\[?::1\\]?)(?::\\d+)?/i.test(String(value || '').trim());\n}", "function isLocalhostUrl(value) {\n  let raw = String(value || '').trim().toLowerCase();\n  if (raw.startsWith('http://')) raw = raw.slice(7);\n  if (raw.startsWith('https://')) raw = raw.slice(8);\n  const slashIndex = raw.indexOf('/');\n  if (slashIndex >= 0) raw = raw.slice(0, slashIndex);\n  return raw === 'localhost' ||\n    raw.startsWith('localhost:') ||\n    raw === '127.0.0.1' ||\n    raw.startsWith('127.0.0.1:') ||\n    raw === '::1' ||\n    raw === '[::1]' ||\n    raw.startsWith('[::1]:');\n}"),
              ("const redirectFromClient = String(requestedRedirect || '').trim();\n  if (/^https?:\\/\\//i.test(redirectFromClient) && !isLocalhostUrl(redirectFromClient)) {\n    return redirectFromClient.replace(/\\/+$/, '');\n  }", "const redirectFromClient = String(requestedRedirect || '').trim();\n  const lowerRedirect = redirectFromClient.toLowerCase();\n  if ((lowerRedirect.startsWith('http://') || lowerRedirect.startsWith('https://')) && !isLocalhostUrl(redirectFromClient)) {\n    return stripTrailingSlashes(redirectFromClient);\n  }"),
              ("return `${forwardedProto}://${forwardedHost}`.replace(/\\/+$/, '');", "return stripTrailingSlashes(`${forwardedProto}://${forwardedHost}`);"),
              ("return originHeader.replace(/\\/+$/, '');", "return stripTrailingSlashes(originHeader);"),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Missing expected server.js text: {old[:80]!r}')
              text = text.replace(old, new, 1)

          marker = "  return getRequestBaseUrl(req);\n}\n\nfunction canSendNotificationEmails() {"
          helper = "  return getRequestBaseUrl(req);\n}\n\nfunction stripTrailingSlashes(value) {\n  const raw = String(value || '');\n  let end = raw.length;\n  while (end > 0 && raw[end - 1] === '/') end -= 1;\n  return raw.slice(0, end);\n}\n\nfunction canSendNotificationEmails() {"
          if marker not in text:
              raise SystemExit('Missing helper insertion point')
          text = text.replace(marker, helper, 1)

          notification_old = "const normalizedBaseUrl = String(baseUrl || '').replace(/\\/+$/, '');"
          notification_new = "const normalizedBaseUrl = stripTrailingSlashes(baseUrl);"
          count = text.count(notification_old)
          if count != 4:
              raise SystemExit(f'Expected 4 notification URL normalizations, found {count}')
          text = text.replace(notification_old, notification_new)

          path.write_text(text)
          PY
      - name: Verify syntax
        run: node --check server.js
      - name: Commit server patch and remove temporary workflow
        run: |
          rm -f .github/workflows/apply-sonar-server-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js .github/workflows/apply-sonar-server-patch.yml
          git diff --cached --quiet && exit 0
          git commit -m "Fix server Sonar hotspots"
          git push origin HEAD:sonar-hotspots-fix
