name: Export SonarCloud Issues

on:
  push:
    branches:
      - claude/affectionate-archimedes-yIHlh
    paths:
      - '.github/workflows/sonar-export.yml'

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/affectionate-archimedes-yIHlh

      - name: Fetch all SonarCloud issues
        env:
          SONAR_TOKEN: "076cd52d84caa8c7a8c27ae0abd6ac0932d4807f"
        run: |
          python3 << 'EOF'
          import urllib.request, json, base64, os

          token = os.environ["SONAR_TOKEN"]
          org = "praxiswrite"
          project = "PraxisWrite_Praxis"
          all_issues = []

          for page in range(1, 5):
              url = (f"https://sonarcloud.io/api/issues/search"
                     f"?organization={org}&componentKeys={project}"
                     f"&resolved=false&ps=500&p={page}")
              req = urllib.request.Request(url)
              creds = base64.b64encode(f"{token}:".encode()).decode()
              req.add_header("Authorization", f"Basic {creds}")
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              issues = data.get("issues", [])
              print(f"Page {page}: {len(issues)} issues")
              all_issues.extend(issues)
              if len(issues) < 500:
                  break

          with open("sonar-issues-raw.json", "w") as f:
              json.dump(all_issues, f)
          print(f"Total fetched: {len(all_issues)}")
          EOF

      - name: Summarise issues
        run: |
          python3 << 'EOF'
          import json

          with open("sonar-issues-raw.json") as f:
              issues = json.load(f)

          by_rule = {}
          by_type = {}
          by_severity = {}

          for issue in issues:
              rule = issue.get("rule", "?")
              t = issue.get("type", "?")
              s = issue.get("severity", "?")
              msg = issue.get("message", "")
              comp = issue.get("component", "").replace("PraxisWrite_Praxis:", "")
              line = issue.get("line", "?")

              by_rule.setdefault(rule, {"count": 0, "type": t, "severity": s, "message": msg, "examples": []})
              by_rule[rule]["count"] += 1
              if len(by_rule[rule]["examples"]) < 5:
                  by_rule[rule]["examples"].append(f"{comp}:{line}")

              by_type[t] = by_type.get(t, 0) + 1
              by_severity[s] = by_severity.get(s, 0) + 1

          summary = {
              "total": len(issues),
              "by_type": by_type,
              "by_severity": by_severity,
              "by_rule": sorted(
                  [{"rule": r, **v} for r, v in by_rule.items()],
                  key=lambda x: -x["count"]
              )
          }

          with open("sonar-issues-summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          print(f"\n=== TOTAL: {len(issues)} issues ===")
          print(f"By type: {by_type}")
          print(f"By severity: {by_severity}")
          print("\nTop rules:")
          for r in summary["by_rule"][:30]:
              print(f"  {r['rule']} ({r['severity']}/{r['type']}): {r['count']:3d}  — {r['message'][:70]}")
          EOF

      - name: Commit summary to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sonar-issues-summary.json sonar-issues-raw.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: export SonarCloud issues for triage"
          git push origin HEAD:claude/affectionate-archimedes-yIHlh
