name: Playwright E2E Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_file:
        description: "Which E2E test should run?"
        required: true
        default: "auth"
        type: choice
        options:
          - auth
          - teacher
          - student
          - cross-role-smoke
          - full-flow
          - all

jobs:
  e2e:
    name: ${{ github.event_name == 'push' && 'Smoke tests (push to main)' || format('Run {0} Playwright test', inputs.test_file) }}
    runs-on: ubuntu-latest

    env:
      TEACHER_EMAIL: ${{ secrets.TEACHER_EMAIL }}
      TEACHER_PASSWORD: ${{ secrets.TEACHER_PASSWORD }}
      STUDENT_EMAIL: ${{ secrets.STUDENT_EMAIL }}
      STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
      PLAYWRIGHT_HTML_OPEN: never

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app and test dependencies
        run: npm install

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npx playwright test tests/e2e/auth.spec.js tests/e2e/teacher.spec.js tests/e2e/cross-role-smoke.spec.js
          else
            case "${{ inputs.test_file }}" in
              auth)
                npx playwright test tests/e2e/auth.spec.js
                ;;
              teacher)
                npx playwright test tests/e2e/teacher.spec.js
                ;;
              student)
                npx playwright test tests/e2e/student.spec.js
                ;;
              cross-role-smoke)
                npx playwright test tests/e2e/cross-role-smoke.spec.js
                ;;
              full-flow)
                npx playwright test tests/e2e/full-flow.spec.js
                ;;
              all)
                npx playwright test
                ;;
              *)
                echo "Unknown test choice: ${{ inputs.test_file }}"
                exit 1
                ;;
            esac
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ github.event_name == 'push' && 'smoke' || inputs.test_file }}-html-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload screenshots, videos, and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ github.event_name == 'push' && 'smoke' || inputs.test_file }}-failure-artifacts
          path: test-results/
          if-no-files-found: ignore
